name: Weekly Event Scraper

on:
  schedule:
    # Runs at 20:00 UTC every Sunday (6:00 AM AEST Monday)
    - cron: '0 20 * * 4'
  workflow_dispatch: # Allows you to trigger it manually via a button in GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper
        run: python scraper.py
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events.json
          # Only commit if there are changes
          git diff-index --quiet HEAD || git commit -m "Automated update of events.json"
          git push
